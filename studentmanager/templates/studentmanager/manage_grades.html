<!-- Note: all pages extend the base template, please check it for more info -->
{% extends 'studentmanager/base.html' %}
{% block content %}
<h2>Grades</h2>
<div class="form-container">
	<form method="post">{% csrf_token %}{{ form.as_p }}
		<button type="submit" class="btn btn-primary">Add Grade</button>
	</form>
</div>
<table class="data-table">
	<thead>
		<tr>
			<th>Student</th>
			<th>Subject</th>
			<th>Grade</th>
			<th>Graded By</th> <th>Actions</th>
		</tr>
	</thead>
	<tbody>
		{% for g in grades %}
		<tr>
			<td>{{ g.student.name }}</td>
			<td>{{ g.subject.name }}</td>
			<td>{{ g.grade }}</td>
			<td>{{ g.graded_by.username|default:"System" }}</td> <td><a href="{% url 'delete_grade' g.id %}" class="btn-danger">Delete</a></td>
		</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock %}
