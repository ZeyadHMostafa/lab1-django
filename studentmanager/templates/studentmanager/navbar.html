<nav class="nav-header">
	<a href="{% url 'home' %}" class="nav-brand">InstructorPortal</a>
	<div class="nav-links">

		{% if user.is_authenticated %}
			<a href="{% url 'home' %}" class="nav-link">Dashboard</a>
			<a href="{% url 'manage_students' %}" class="nav-link">Students</a>
			<a href="{% url 'manage_subjects' %}" class="nav-link">Subjects</a>
			<a href="{% url 'manage_grades' %}" class="nav-link">Grades</a>
			<a href="{% url 'contact_us' %}" class="nav-link">Contact</a>
		{% endif %}
		
		<span class="auth-links">
			{% if user.is_authenticated %}
				<a href="{% url 'profile' %}" class="nav-link"><strong>{{ user.username }}</strong></a>
				<form action="{% url 'logout' %}" method="post" style="display:inline;">
					{% csrf_token %}
					<button type="submit" class="btn-link">Logout</button>
				</form>
			{% else %}
				<a href="{% url 'login' %}" class="nav-link">Login</a>
			{% endif %}
		</span>
	</div>
</nav>
